{% extends "base.html" %}
{% block title %}Remove vehicle · {{ SITE_SHORT_NAME }}{% endblock %}

{% block content %}
<div class="card card--narrow">
  <h1 class="card__title">Remove vehicle</h1>
  <p>Remove <strong>{{ vehicle.plate_number }}</strong> ({{ vehicle.get_vehicle_type_display }})?</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn--danger">Remove</button>
      <a class="btn btn--ghost" href="{% url 'accounts:vehicles' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
