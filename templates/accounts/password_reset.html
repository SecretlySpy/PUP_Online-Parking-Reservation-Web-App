{% extends "base.html" %}
{% block title %}Reset password · {{ SITE_SHORT_NAME }}{% endblock %}

{% block content %}
<div class="card card--narrow">
  <h1 class="card__title">Reset your password</h1>
  <p class="muted">Enter the email on your account and we'll send a one-time reset link.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "partials/form_fields.html" %}
    <div class="form-actions">
      <button type="submit" class="btn btn--block">Send reset link</button>
    </div>
  </form>
</div>
{% endblock %}
