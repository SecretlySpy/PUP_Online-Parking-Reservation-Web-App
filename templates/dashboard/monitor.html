{% extends "base.html" %}
{% load static %}
{% block title %}Live Monitor · {{ SITE_SHORT_NAME }}{% endblock %}

{% block content %}
<div class="card"><h1 style="margin:0">Live slot monitor</h1></div>
{% include "dashboard/_nav.html" %}

<div class="card">
  <form id="monitor-filters" class="filter-bar" method="get">
    <div class="filter-bar__field">
      <label for="monitor-floor">Floor</label>
      <select name="floor" id="monitor-floor" class="form-input">
        <option value="">All floors</option>
        {% for f in floors %}<option value="{{ f.pk }}" {% if current_floor == f.pk|stringformat:'s' %}selected{% endif %}>{{ f.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="filter-bar__field">
      <label for="monitor-type">Type</label>
      <select name="vehicle_type" id="monitor-type" class="form-input">
        <option value="">All types</option>
        {% for val, label in vehicle_types %}<option value="{{ val }}" {% if current_type == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
      </select>
    </div>
    <div class="filter-bar__field filter-bar__actions"><button class="btn btn--sm">Apply</button></div>
  </form>
</div>

<div class="card">
  <div class="poll-status" data-poll-status-for="monitor-grid" aria-live="polite"></div>
  <div id="monitor-grid" class="live-poll"
       data-poll-endpoint="{% url 'dashboard:monitor_partial' %}"
       data-poll-form="monitor-filters" data-poll-interval="10000">
    {% include "dashboard/_monitor_grid.html" %}
  </div>
</div>
{% endblock %}

{% block body_extra %}
<script src="{% static 'js/live-poll.js' %}" defer></script>
{% endblock %}
